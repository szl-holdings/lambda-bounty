# Doctrine v11 — 749 / 14 / 163 · locked_at c7c0ba17
#
# Validates a submission: it must compile under `lake build` AND prove
# Lambda.lambda_aggregator_unique with NO `sorry` and NO axiom beyond the
# allowlist (propext, Quot.sound, Classical.choice). NO bypass.
name: verify-proof

on:
  pull_request:
    paths:
      - "Lambda/**"
      - "lakefile.lean"
      - "lean-toolchain"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          chmod +x elan-init.sh
          ./elan-init.sh -y --default-toolchain "$(cat lean-toolchain | cut -d: -f2)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Mathlib build
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages
            .lake/build
          key: lake-${{ runner.os }}-${{ hashFiles('lakefile.lean','lean-toolchain') }}

      - name: Fetch Mathlib cache
        run: |
          lake exe cache get || true

      - name: lake build (must be green)
        run: lake build

      - name: Reject any `sorry` (open bounty fails here until solved)
        run: |
          # A winning submission discharges the `sorry` in Lambda/Lambda.lean (and adds
          # no new ones). Until then, `main` legitimately fails this gate: that failing
          # state IS the public, honest signal that Conjecture 1 remains OPEN.
          if grep -RInE '(^|[^a-zA-Z_])sorry([^a-zA-Z_]|$)' Lambda/; then
            echo "::error::A `sorry` remains. Conjecture 1 is still OPEN — discharge it to win the bounty."
            exit 1
          fi
          echo "No `sorry` anywhere — conjecture appears discharged. Proceeding to axiom audit."

      - name: Axiom allowlist check (#print axioms)
        run: |
          cat > _AxiomCheck.lean <<'LEAN'
          import Lambda.Lambda
          open Lambda
          #print axioms lambda_aggregator_unique
          LEAN
          # Print the axioms the discharged theorem depends on.
          lake env lean _AxiomCheck.lean > axioms.txt 2>&1 || { cat axioms.txt; exit 1; }
          cat axioms.txt
          # Allowlist: propext, Quot.sound, Classical.choice. Reject sorryAx + others.
          if grep -qE 'sorryAx' axioms.txt; then
            echo "::error::theorem still depends on sorryAx — not proved."; exit 1
          fi
          # Extract axiom identifiers and ensure each is allowlisted.
          BAD=$(grep -oE "'[^']+'" axioms.txt | tr -d "'" | grep -vE '^(propext|Quot\.sound|Classical\.choice)$' || true)
          # The first line is the theorem name itself; filter known non-axiom lines.
          BAD=$(echo "$BAD" | grep -vE '^(lambda_aggregator_unique|depends on axioms:|Lambda)$' || true)
          if [ -n "$BAD" ]; then
            echo "::error::theorem depends on non-allowlisted axioms:"; echo "$BAD"; exit 1
          fi
          echo "Axiom allowlist satisfied."

      - name: Green — eligible for auto-merge + Khipu acceptance receipt
        run: echo "Submission compiles, no sorry, axioms allowlisted. Eligible for bounty."

  # On a GREEN proof landing on main, tell the bounty board (lutar-lean) to
  # auto-close Conjecture 1. The board itself opens a signed PR and re-validates;
  # this job only carries the accepted-proof provenance across repos. It is a
  # no-op (skipped) until the org secret BOUNTY_BOARD_TOKEN is set — a PAT with
  # `contents: write` (or repo dispatch) on szl-holdings/lutar-lean.
  notify-board:
    name: Notify bounty board (Conjecture 1 solved)
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dispatch bounty-solved to lutar-lean
        env:
          BOARD_TOKEN: ${{ secrets.BOUNTY_BOARD_TOKEN }}
          SOLVER: ${{ github.event.head_commit.author.username || github.actor }}
          PROOF_COMMIT: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${BOARD_TOKEN:-}" ]; then
            echo "::notice::BOUNTY_BOARD_TOKEN not set — skipping board notification."
            echo "Set it (a PAT with write on szl-holdings/lutar-lean) to enable auto-close."
            exit 0
          fi
          payload=$(cat <<JSON
          {
            "event_type": "bounty-solved",
            "client_payload": {
              "bounty_id": "conjecture-1-lambda-uniqueness",
              "solver": "${SOLVER}",
              "proof_commit": "${PROOF_COMMIT}",
              "proof_repo": "${GITHUB_REPOSITORY}",
              "verify_run": "${RUN_URL}"
            }
          }
          JSON
          )
          code=$(curl -sS -o /tmp/resp.txt -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${BOARD_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/szl-holdings/lutar-lean/dispatches" \
            -d "${payload}")
          echo "dispatch HTTP ${code}"
          if [ "${code}" != "204" ]; then
            cat /tmp/resp.txt
            echo "::error::repository_dispatch to lutar-lean failed (HTTP ${code})."
            exit 1
          fi
          echo "Board notified — lutar-lean will open the auto-close PR for Conjecture 1."
